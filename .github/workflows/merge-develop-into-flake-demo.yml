name: Merge develop/master into flake-demo

on:
  push:
    branches:
      - develop
      - master

jobs:
  merge-into-flake-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set committer info
        run: |
          git config --local user.email "$(git log -1 --format='%ae')"
          git config --local user.name "$(git log -1 --format='%an')"

      - name: Define source branch
        id: source
        run: |
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Checkout flake-demo branch
        run: git checkout flake-demo

      - name: Check for merge conflict
        id: check_conflict
        run: |
          SOURCE=${{ steps.source.outputs.branch }}

          if git merge-tree \
            $(git merge-base HEAD "$SOURCE") \
            "$SOURCE" \
            HEAD | grep "<<<<<<<"; then
            echo "merge_conflict=true" >> $GITHUB_OUTPUT
          else
            echo "merge_conflict=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge source branch into flake-demo
        if: steps.check_conflict.outputs.merge_conflict == 'false'
        run: |
          git merge ${{ steps.source.outputs.branch }}

      - name: Push changes
        if: steps.check_conflict.outputs.merge_conflict == 'false'
        run: git push

      - name: Create fallback branch
        if: steps.check_conflict.outputs.merge_conflict == 'true'
        id: gen_names
        run: |
          SOURCE=${{ steps.source.outputs.branch }}
          SHA=$(git rev-parse --short "$SOURCE")
          BRANCH="${SHA}-${SOURCE}-into-flake-demo"

          git checkout -b "$BRANCH" "$SOURCE"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_conflict.outputs.merge_conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'flake-demo',
              head: '${{ steps.gen_names.outputs.branch }}',
              title: `chore: merge ${{ steps.gen_names.outputs.source }} (${{ steps.gen_names.outputs.sha }}) into flake-demo`,
              body: 'There was a merge conflict. Please resolve it and complete the merge.'
            });