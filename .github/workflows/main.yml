name: Cypress Tests

on:
  push:
    branches-ignore:
      - "renovate/**"

jobs:
  install:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:22.20.0
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

  ui-chrome-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    container:
      image: cypress/browsers:22.20.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - run: yarn cypress run --browser chrome

  ui-chrome-mobile-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    container:
      image: cypress/browsers:22.20.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - run: yarn cypress run --browser chrome --config viewportWidth=375,viewportHeight=667

  ui-firefox-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    container:
      image: cypress/browsers:22.20.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - run: yarn cypress run --browser firefox

  ui-firefox-mobile-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: install
    container:
      image: cypress/browsers:22.20.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - run: yarn cypress run --browser firefox --config viewportWidth=375,viewportHeight=667